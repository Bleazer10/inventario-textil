{% extends "base.html" %}

{% block titulo %}Nuevo gasto{% endblock %}

{% block breadcrumbs %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{% url 'dashboard' %}"><i class="fa-solid fa-home"></i></a></li>
    <li class="breadcrumb-item active">Nuevo gasto</li>
  </ol>
</nav>
{% endblock %}

{% block content %}

<div class="mb-4">
  <h2 class="fw-black mb-0">Nuevo gasto</h2>
  <div class="text-white-50">Registra un egreso del negocio</div>
</div>

<div class="row justify-content-center">
  <div class="col-12 col-lg-8">
    <div class="card card-bemore">
      <div class="card-header">
        <i class="fa-solid fa-file-invoice-dollar me-2"></i> Información del gasto
      </div>
      <div class="card-body p-4">
        <form method="post" novalidate>
          {% csrf_token %}

          <!-- Fila 1: Fecha + Monto -->
          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-6">
              <label class="form-label">
                <i class="fa-solid fa-calendar me-1 text-orange"></i> Fecha
              </label>
              <input type="date" name="fecha" class="form-control" required>
            </div>
            <div class="col-12 col-sm-6">
              <label class="form-label">
                <i class="fa-solid fa-dollar-sign me-1 text-orange"></i> Monto
              </label>
              <div class="input-group">
                <span class="input-group-text bg-dark text-white border-secondary">$</span>
                <input type="number" step="0.01" min="0" name="monto" class="form-control" placeholder="0.00" required>
              </div>
            </div>
          </div>

          <!-- Fila 2: Categoría + Estado de pago -->
          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-6">
              <label class="form-label">
                <i class="fa-solid fa-tag me-1 text-orange"></i> Categoría
              </label>
              <select name="categoria" class="form-control" required>
                <option value="">Selecciona...</option>
                {% for c in categorias %}
                  <option value="{{ c.id }}">{{ c.nombre }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-12 col-sm-6">
              <label class="form-label">
                <i class="fa-solid fa-circle-check me-1 text-orange"></i> Estado de pago
              </label>
              <select name="estado_pago" class="form-control">
                <option value="PENDIENTE">⏳ Pendiente</option>
                <option value="PAGADO">✅ Pagado</option>
                <option value="PARCIAL">🔶 Parcial</option>
              </select>
            </div>
          </div>

          <!-- Descripción -->
          <div class="mb-4">
            <label class="form-label">
              <i class="fa-solid fa-pen-to-square me-1 text-orange"></i> Descripción
              <span class="text-white-50 fw-normal ms-1">(opcional)</span>
            </label>
            <textarea name="descripcion" class="form-control" rows="3"
              placeholder="Detalla el motivo del gasto..."></textarea>
          </div>

          <!-- Botones -->
          <div class="d-flex gap-2">
            <button class="btn btn-bemore fw-bold flex-fill" type="submit">
              <i class="fa-solid fa-floppy-disk me-2"></i> Guardar gasto
            </button>
            <a href="{% url 'dashboard' %}" class="btn btn-outline-light fw-bold flex-fill">
              <i class="fa-solid fa-times me-2"></i> Cancelar
            </a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
