{% extends "base.html" %}
{% block titulo %}Pagar compra{% endblock %}

{% block content %}
<div class="mb-3">
  <h2 class="fw-black mb-0">Registrar pago (Compra)</h2>
  <div class="text-white-50">
    Cuenta #{{ cxp.id }} • Saldo: <span class="fw-black">${{ cxp.saldo }}</span>
  </div>
</div>

<div class="row justify-content-center">
  <div class="col-12 col-lg-7">
    <div class="card card-bemore">
      <div class="card-header text-center">Pago</div>
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}

          <div class="row g-2">
            <div class="col-md-4">
              <label class="form-label">Fecha</label>
              <input type="date" name="fecha" class="form-control" value="{% now 'Y-m-d' %}">
            </div>
            <div class="col-md-4">
              <label class="form-label">Método</label>
              <input type="text" name="metodo" class="form-control" placeholder="Efectivo, transferencia...">
            </div>
            <div class="col-md-4">
              <label class="form-label">Monto</label>
              <input type="number" name="monto" min="0.01" step="0.01" class="form-control" value="{{ cxp.saldo }}">
            </div>
          </div>

          <div class="mt-2">
            <label class="form-label">Nota (opcional)</label>
            <textarea name="nota" rows="2" class="form-control"></textarea>
          </div>

          <button class="btn btn-bemore w-100 fw-bold mt-3" type="submit">
            <i class="fa-solid fa-floppy-disk me-2"></i> Guardar pago
          </button>

          <a class="btn btn-outline-light w-100 mt-2" href="{% url 'lista_por_pagar_compras' %}">Volver</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
